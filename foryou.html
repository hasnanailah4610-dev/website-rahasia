<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Just You</title>
<style>
    body {
        margin: 0;
        background: #0b0b0b;
        overflow: hidden;
        font-family: 'Courier New', monospace;
    }

    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let text = "I LOVE YOU";
let particles = [];

function heart(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
    return {x, y};
}

// buat titik-titik membentuk hati
for (let i = 0; i < 200; i++) {
    let t = Math.random() * Math.PI * 2;
    let pos = heart(t);
    particles.push({
        baseX: pos.x,
        baseY: pos.y,
        t: t,
        offset: Math.random() * 100
    });
}

function draw(time) {
    ctx.fillStyle = "rgba(11,11,11,0.3)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff4da6"; // pink
    ctx.font = "14px monospace";

    particles.forEach((p, i) => {
        let scale = 20;

        // efek gerak halus (denyut dikit)
        let pulse = Math.sin(time/500 + p.offset) * 0.5;

        let x = canvas.width/2 + (p.baseX * (scale + pulse));
        let y = canvas.height/2 - (p.baseY * (scale + pulse));

        ctx.fillText(text, x, y);
    });

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
